<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculdora de Gorjeta</title>
</head>
<body>
    <header>
        <img src="./images/logo.svg" alt="logo do splitter">
    </header>

    <main>
        <section class="informacoes">
            <form action="">
                <div class="conta">
                    <label for="conta">Conta</label>
                    <div>
                        <img src="./images/icon-dollar.svg" alt="icone do cifrão">
                        <input type="number" name="conta" id="conta" placeholder="Outra">
                    </div>
                </div>

                <div class="gorjeta">
                    <label for=""> Selecione a gorjeta %</label>

                    <div>
                         <input type="button" value="5%">
                         <input type="button" value="10%">
                         <input type="button" value="15%">
                         <input type="button" vaule="25%">
                         <input type="button" vaule="50%">
                         <input type="number" name="outra" id="outra" placeholder="Outra">
                    </div>
                </div>

                <div class="pessoas">
                    <label for="pessoas"> Quantidade de pessoas</label>
                    <p>não pode ser zero</p>
                    <div>
                        <img src="./images/icon-person.svg" alt="icone da pessoa">
                        <input type="number" name="conta" id="pessos">
                    </div>
                </div>
            </form>
        </section>

        <section class="resultados">
            <div class="gorjeta">
                <p>
                    <strong>Gorjeta</strong> <br>
                    / pessoa
                 </p>
                    <strong>$0.00</strong>
                
            </div>

               <div class="total">
                <p>
                    <strong>Total</strong> <br>
                    / pessoa
                
                </p>
                    <strong>$0.00</strong>
                
            </div>

        </section>
    </main>
</body>
</html>
